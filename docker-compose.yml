services:
  portfolio-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portfolio-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${PORTFOLIO_DB_PASSWORD:?Set PORTFOLIO_DB_PASSWORD in .env}
    ports:
      - "${PORTFOLIO_DB_PORT:-1433}:1433"
    volumes:
      - portfolio-sql-data:/var/opt/mssql
      - ./db:/db:ro
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  portfolio-sql-data:

